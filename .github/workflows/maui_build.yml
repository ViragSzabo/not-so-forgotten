name: .NET MAUI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore Dependencies
      run: dotnet restore NotSoForgottenCemetery/NotSoForgottenCemetery.sln

    - name: Build Project
      run: dotnet build NotSoForgottenCemetery/NotSoForgottenCemetery.csproj -c Release -f net8.0-windows10.0.19041.0
